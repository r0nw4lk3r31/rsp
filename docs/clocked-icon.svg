<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Clock face -->
  <circle cx="100" cy="100" r="88" fill="#0d0d1a" stroke="#4a9eff" stroke-width="3"/>

  <!-- Hour tick marks at 12, 3, 6, 9 -->
  <line x1="100" y1="16" x2="100" y2="30" stroke="#4a9eff" stroke-width="3" stroke-linecap="round"/>
  <line x1="184" y1="100" x2="170" y2="100" stroke="#4a9eff" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="184" x2="100" y2="170" stroke="#4a9eff" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="100" x2="30" y2="100" stroke="#4a9eff" stroke-width="3" stroke-linecap="round"/>

  <!-- Minor tick marks -->
  <line x1="145" y1="21"  x2="139" y2="31"  stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="179" y1="55"  x2="169" y2="61"  stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="179" y1="145" x2="169" y2="139" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="145" y1="179" x2="139" y2="169" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="55"  y1="179" x2="61"  y2="169" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="21"  y1="145" x2="31"  y2="139" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="21"  y1="55"  x2="31"  y2="61"  stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="55"  y1="21"  x2="61"  y2="31"  stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Short hour hand pointing roughly to 10 (for 10:15 feel / classic clock look) -->
  <line x1="100" y1="100" x2="72" y2="52" stroke="#4a9eff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- "Clocked" as the second hand pointing to 15:00 (3 o'clock = rightward) -->
  <!-- Text runs from center (100,100) to circle edge at ~(188,100), "d" touches the ring -->
  <text
    x="101"
    y="96"
    font-family="'Courier New', Courier, monospace"
    font-size="15"
    font-weight="bold"
    letter-spacing="1.5"
    fill="#ffffff"
    textLength="86"
    lengthAdjust="spacingAndGlyphs">Clocked</text>

  <!-- Thin line extension of hand past "d" to circle edge (acts as the pointer tip) -->
  <line x1="190" y1="100" x2="184" y2="100" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Center pivot dot -->
  <circle cx="100" cy="100" r="5" fill="#4a9eff"/>
  <circle cx="100" cy="100" r="2.5" fill="#0d0d1a"/>

</svg>
